name: 24/7 Telegram Bot Runner

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' # Перезапуск каждые 6 часов для стабильности
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiogram aiohttp

    - name: Run Bot with Auto-Restart
      env:
        BOT_TOKEN: "${{ secrets.BOT_TOKEN }}"
        CRYPTO_PAY_TOKEN: "${{ secrets.CRYPTO_PAY_TOKEN }}"
        ADMIN_ID: "${{ secrets.ADMIN_ID }}"
        CHANNEL_ID: "${{ secrets.CHANNEL_ID }}"
      run: |
        # Цикл для автоматического перезапуска при падении
        until python main_vps.py; do
          echo "Bot crashed with exit code $?. Respawning.." >&2
          sleep 5
        done
